<!DOCTYPE html>
<html lang="pl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RevAdmin - Panel Zarządzania</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857' },
                        dark: { 900: '#050505', 800: '#111111', 700: '#1a1a1a', 600: '#2a2a2a' }
                    },
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #050505; color: #f3f4f6; -webkit-font-smoothing: antialiased; }
        .glass-panel { background: rgba(17, 17, 17, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .premium-card { background: linear-gradient(145deg, #111111 0%, #0a0a0a 100%); border: 1px solid #1a1a1a; transition: all 0.3s ease; }
        .premium-card:hover { border-color: #2a2a2a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #10b981; }
        .text-glow { text-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
        .input-field { background: #0a0a0a; border: 1px solid #1a1a1a; transition: all 0.2s; }
        .input-field:focus { border-color: #10b981; box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.1); outline: none; }
        .status-badge { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
        .status-active { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
        .status-pending { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.2); }
        .view-section { display: none; animation: fadeIn 0.4s ease forwards; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-dark-900 text-gray-100 overflow-hidden selection:bg-brand-500 selection:text-dark-900 font-sans">

    <!-- Ekran Logowania -->
    <div id="login-overlay" class="fixed inset-0 bg-dark-900 z-50 flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+CgkJPHBhdGggZD0iTTAgMGg0MHY0MEgweiIgZmlsbD0ibm9uZSIvPgoJCTxwYXRoIGQ9Ik00MCAwaC0xdjQwaDFWMHoiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wMSkiLz4KCQk8cGF0aCBkPSJNMCAzOWg0MHYxaC00MHoiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wMSkiLz4KCTwvc3ZnPg==')] pointer-events-none z-0 opacity-50"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-brand-900/20 blur-[100px] pointer-events-none z-0"></div>
        
        <div class="relative z-10 glass-panel p-10 rounded-3xl border border-dark-700 shadow-2xl text-center w-full max-w-sm">
            <h1 class="text-3xl font-black tracking-wide text-white mb-2">Rev<span class="text-brand-500 text-glow">Admin</span></h1>
            <p class="text-gray-400 text-sm mb-8">Wprowadź kod dostępu</p>
            
            <form id="login-form" class="space-y-6">
                <input type="password" id="pin-input" maxlength="4" pattern="\d{4}" autocomplete="off" 
                    class="w-full bg-dark-800 border-2 border-dark-600 text-white text-center text-4xl tracking-[0.5em] rounded-xl py-4 focus:border-brand-500 focus:outline-none transition-colors" 
                    placeholder="••••">
                <p id="login-error" class="text-red-500 text-sm font-medium hidden">Błędny kod PIN</p>
                <button type="submit" class="w-full bg-brand-500 hover:bg-brand-400 text-dark-900 font-bold px-8 py-4 rounded-xl transition-all">Zaloguj się</button>
            </form>
        </div>
    </div>

    <!-- Główny Aplikacja -->
    <div id="app-wrapper" class="flex h-screen opacity-0 invisible transition-opacity duration-500 w-full">
        <!-- Sidebar -->
        <aside class="w-64 glass-panel border-r border-dark-700 flex flex-col z-20 hidden md:flex shrink-0">
            <div class="h-20 flex items-center px-6 border-b border-dark-700">
                <h1 class="text-2xl font-black tracking-wide text-white">Rev<span class="text-brand-500 text-glow">Admin</span></h1>
            </div>
            
            <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-2">
                <p class="px-2 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Główne</p>
                <button onclick="switchView('dashboard')" class="nav-btn w-full flex items-center px-4 py-3 text-sm font-medium rounded-xl text-white bg-brand-500/10 border border-brand-500/20 transition-all" data-target="dashboard">
                    <i class="fa-solid fa-chart-pie w-6 text-brand-500"></i> Statystyki
                </button>
                <button onclick="switchView('zlecenia')" class="nav-btn w-full flex items-center px-4 py-3 text-sm font-medium rounded-xl text-gray-400 hover:text-white hover:bg-dark-800 transition-all" data-target="zlecenia">
                    <i class="fa-solid fa-clipboard-list w-6"></i> Zlecenia
                </button>

                <p class="px-2 text-xs font-semibold text-gray-500 uppercase tracking-wider mt-6 mb-2">Zarządzanie</p>
                <button onclick="switchView('pracownicy')" class="nav-btn w-full flex items-center px-4 py-3 text-sm font-medium rounded-xl text-gray-400 hover:text-white hover:bg-dark-800 transition-all" data-target="pracownicy">
                    <i class="fa-solid fa-users w-6"></i> Pracownicy
                </button>
            </nav>

            <div class="p-4 border-t border-dark-700 flex justify-between items-center px-4">
                <p class="text-sm font-bold text-white">Administrator</p>
                <button onclick="logout()" class="text-gray-500 hover:text-red-500"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-screen relative overflow-hidden">
            <!-- Topbar -->
            <header class="h-20 glass-panel border-b border-dark-700 flex items-center justify-between px-8 z-10 shrink-0">
                <div class="w-1/2">
                    <h2 id="topbar-title" class="text-xl font-bold text-white">Dashboard</h2>
                </div>
                <div class="flex items-center gap-4">
                    <a href="/" target="_blank" class="text-sm font-medium text-gray-400 hover:text-brand-500 transition-colors mr-4">
                        <i class="fa-solid fa-globe mr-1"></i> Zobacz stronę
                    </a>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-8 z-10 relative w-full" id="content-area">
                
                <!-- DASHBOARD -->
                <div id="view-dashboard" class="view-section active">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div class="premium-card rounded-2xl p-6">
                            <p class="text-sm text-gray-500 mb-1">Zlecenia ogółem</p>
                            <h3 id="stat-zlecenia" class="text-3xl font-bold text-white">0</h3>
                        </div>
                        <div class="premium-card rounded-2xl p-6">
                            <p class="text-sm text-gray-500 mb-1">Liczba pracowników</p>
                            <h3 id="stat-pracownicy" class="text-3xl font-bold text-white">0</h3>
                        </div>
                    </div>
                </div>

                <!-- ZLECENIA -->
                <div id="view-zlecenia" class="view-section">
                    <div class="flex justify-between items-end mb-8">
                        <div>
                            <h2 class="text-3xl font-bold text-white mb-2">Baza Zleceń</h2>
                        </div>
                        <button onclick="document.getElementById('form-zlecenie-container').classList.toggle('hidden')" class="bg-brand-500 hover:bg-brand-400 text-dark-900 font-bold px-6 py-3 rounded-xl transition-all">
                            <i class="fa-solid fa-plus mr-2"></i> Nowe Zlecenie
                        </button>
                    </div>

                    <!-- Formularz zlecenia (ukryty domyślnie) -->
                    <div id="form-zlecenie-container" class="hidden premium-card rounded-2xl p-6 mb-8 border border-brand-500/30">
                        <h3 class="text-xl font-bold text-brand-500 mb-4">Kreator nowego zlecenia</h3>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                            <select id="z-typ" class="input-field rounded-xl px-4 py-2 text-white">
                                <option>Przeprowadzka</option><option>Transport</option><option>Opróżnianie</option>
                            </select>
                            <input type="datetime-local" id="z-data" class="input-field rounded-xl px-4 py-2 text-white">
                            <input type="number" id="z-stawka" placeholder="Stawka PLN" class="input-field rounded-xl px-4 py-2 text-white">
                            <!-- Select dla ekip zaciągany z bazy -->
                            <select id="z-ekipa" class="input-field rounded-xl px-4 py-2 text-white">
                                <option value="">Wybierz pracownika...</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                            <input type="text" id="z-skad" placeholder="Skąd" class="input-field rounded-xl px-4 py-2 text-white">
                            <input type="text" id="z-dokad" placeholder="Dokąd" class="input-field rounded-xl px-4 py-2 text-white">
                        </div>
                        <textarea id="z-opis" placeholder="Opis zadania" class="w-full input-field rounded-xl px-4 py-2 text-white resize-none mb-4"></textarea>
                        
                        <button onclick="dodajZlecenie()" class="bg-brand-500 text-dark-900 font-bold px-6 py-2 rounded-xl">Zapisz zlecenie</button>
                    </div>

                    <!-- Tabela zleceń -->
                    <div class="premium-card rounded-2xl overflow-hidden">
                        <table class="w-full text-left text-sm text-gray-400">
                            <thead class="text-xs uppercase bg-dark-800 text-gray-500">
                                <tr>
                                    <th class="px-4 py-3">Data</th>
                                    <th class="px-4 py-3">Typ</th>
                                    <th class="px-4 py-3">Trasa</th>
                                    <th class="px-4 py-3">Kwota</th>
                                    <th class="px-4 py-3">Ekipa</th>
                                    <th class="px-4 py-3">Status</th>
                                </tr>
                            </thead>
                            <tbody id="lista-zlecen-body">
                                <!-- Zlecenia z bazy -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- PRACOWNICY -->
                <div id="view-pracownicy" class="view-section">
                    <div class="flex justify-between items-end mb-8">
                        <h2 class="text-3xl font-bold text-white">Kadra Pracownicza</h2>
                        <button onclick="document.getElementById('form-pracownik-container').classList.toggle('hidden')" class="bg-dark-800 border border-dark-700 text-white font-bold px-6 py-3 rounded-xl hover:border-brand-500 transition-all">
                            Dodaj pracownika
                        </button>
                    </div>

                    <!-- Formularz dodawania pracownika -->
                    <div id="form-pracownik-container" class="hidden premium-card rounded-2xl p-6 mb-8 border border-dark-600">
                        <h3 class="text-xl font-bold text-white mb-4">Nowy pracownik</h3>
                        <div class="flex gap-4">
                            <input type="text" id="p-imie" placeholder="Imię i nazwisko" class="input-field rounded-xl px-4 py-2 text-white flex-1">
                            <input type="text" id="p-rola" placeholder="Rola (np. Kierowca)" class="input-field rounded-xl px-4 py-2 text-white flex-1">
                            <select id="p-dzial" class="input-field rounded-xl px-4 py-2 text-white flex-1">
                                <option>Przeprowadzki</option>
                                <option>Transport</option>
                                <option>Utylizacja</option>
                            </select>
                            <button onclick="dodajPracownika()" class="bg-brand-500 text-dark-900 font-bold px-6 py-2 rounded-xl">Dodaj</button>
                        </div>
                    </div>

                    <!-- Karty pracowników renderowane dynamicznie -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="lista-pracownikow">
                        <!-- Tu pojawią się karty -->
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        // --- LOGIKA SPA I AUTORYZACJI ---
        const loginOverlay = document.getElementById('login-overlay');
        const appWrapper = document.getElementById('app-wrapper');
        const errorMsg = document.getElementById('login-error');

        async function checkAuth() {
            try {
                const res = await fetch('/api/check-auth');
                if (res.ok) {
                    showApp();
                    wczytajDaneZBazy(); // Załaduj dane jak wejdzie!
                }
            } catch (err) {}
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pin = document.getElementById('pin-input').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pin })
            });
            if (res.ok) {
                errorMsg.classList.add('hidden');
                showApp();
                wczytajDaneZBazy();
            } else {
                errorMsg.classList.remove('hidden');
                document.getElementById('pin-input').value = '';
            }
        });

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.reload();
        }

        function showApp() {
            loginOverlay.classList.add('opacity-0');
            setTimeout(() => {
                loginOverlay.classList.add('hidden');
                appWrapper.classList.remove('opacity-0', 'invisible');
                appWrapper.classList.add('opacity-100', 'visible');
            }, 500);
        }

        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if(btn.dataset.target === viewId) {
                    btn.classList.add('bg-brand-500/10', 'border-brand-500/20', 'text-white');
                    btn.classList.remove('text-gray-400', 'border-transparent');
                    btn.querySelector('i').classList.add('text-brand-500');
                } else {
                    btn.classList.remove('bg-brand-500/10', 'border-brand-500/20', 'text-white');
                    btn.classList.add('text-gray-400', 'border-transparent');
                    btn.querySelector('i').classList.remove('text-brand-500');
                }
            });
        }

        checkAuth();

        // --- LOGIKA BAZY DANYCH (FRONTEND) ---

        async function wczytajDaneZBazy() {
            await fetchPracownicy();
            await fetchZlecenia();
        }

        // PRACOWNICY
        async function fetchPracownicy() {
            const res = await fetch('/api/pracownicy');
            const pracownicy = await res.json();
            
            // 1. Zbuduj widok kart
            const container = document.getElementById('lista-pracownikow');
            container.innerHTML = '';
            
            // 2. Dodaj ich do selectora w Zleceniach
            const selectZlecenia = document.getElementById('z-ekipa');
            selectZlecenia.innerHTML = '<option value="">Wybierz pracownika...</option>';

            pracownicy.forEach(p => {
                // Do selektora
                const opt = document.createElement('option');
                opt.value = p.imie;
                opt.textContent = p.imie;
                selectZlecenia.appendChild(opt);

                // Do kart
                const inicjal = p.imie.charAt(0).toUpperCase();
                container.innerHTML += `
                    <div class="premium-card rounded-2xl p-6 relative overflow-hidden">
                        <div class="absolute top-0 right-0 p-4">
                            <span class="status-badge status-active">${p.status}</span>
                        </div>
                        <div class="flex items-center gap-4 mb-6">
                            <div class="w-16 h-16 rounded-full bg-dark-700 flex items-center justify-center text-2xl text-gray-400">${inicjal}</div>
                            <div>
                                <h3 class="text-xl font-bold text-white">${p.imie}</h3>
                                <p class="text-sm text-brand-500">${p.rola}</p>
                            </div>
                        </div>
                        <div class="space-y-3 pt-4 border-t border-dark-700 text-sm">
                            <div class="flex justify-between"><span class="text-gray-500">Dział</span><span class="font-bold text-white">${p.dzial}</span></div>
                            <div class="flex justify-between"><span class="text-gray-500">Suma zarobków</span><span class="font-bold text-brand-400">${p.zarobki} PLN</span></div>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('stat-pracownicy').innerText = pracownicy.length;
        }

        async function dodajPracownika() {
            const imie = document.getElementById('p-imie').value;
            const rola = document.getElementById('p-rola').value;
            const dzial = document.getElementById('p-dzial').value;

            if(!imie) return alert('Wpisz imię i nazwisko!');

            await fetch('/api/pracownicy', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ imie, rola, dzial })
            });

            document.getElementById('p-imie').value = '';
            document.getElementById('p-rola').value = '';
            document.getElementById('form-pracownik-container').classList.add('hidden');
            fetchPracownicy(); // odśwież widok
        }

        // ZLECENIA
        async function fetchZlecenia() {
            const res = await fetch('/api/zlecenia');
            const zlecenia = await res.json();
            
            const tbody = document.getElementById('lista-zlecen-body');
            tbody.innerHTML = '';

            zlecenia.forEach(z => {
                let dataFormatowana = z.data ? z.data.replace('T', ' ') : '-';
                tbody.innerHTML += `
                    <tr class="border-b border-dark-700/50 hover:bg-dark-800/50 transition-colors">
                        <td class="px-4 py-4 text-white">${dataFormatowana}</td>
                        <td class="px-4 py-4 font-medium text-white">${z.typ}</td>
                        <td class="px-4 py-4 text-xs">
                            <span class="text-gray-500">Skąd:</span> ${z.skad || '-'} <br>
                            <span class="text-gray-500">Dokąd:</span> ${z.dokad || '-'}
                        </td>
                        <td class="px-4 py-4 text-brand-400 font-medium">${z.stawka || 0} PLN</td>
                        <td class="px-4 py-4">${z.ekipa || 'Brak'}</td>
                        <td class="px-4 py-4"><span class="status-badge status-pending">${z.status}</span></td>
                    </tr>
                `;
            });

            document.getElementById('stat-zlecenia').innerText = zlecenia.length;
        }

        async function dodajZlecenie() {
            const zData = {
                typ: document.getElementById('z-typ').value,
                data: document.getElementById('z-data').value,
                stawka: document.getElementById('z-stawka').value,
                ekipa: document.getElementById('z-ekipa').value,
                skad: document.getElementById('z-skad').value,
                dokad: document.getElementById('z-dokad').value,
                opis: document.getElementById('z-opis').value
            };

            await fetch('/api/zlecenia', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(zData)
            });

            // Wyczyść formularz
            ['z-data', 'z-stawka', 'z-skad', 'z-dokad', 'z-opis'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('form-zlecenie-container').classList.add('hidden');
            
            fetchZlecenia(); // odśwież listę
        }
    </script>
</body>
</html>
